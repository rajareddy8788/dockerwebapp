version: "3.9"

services:
  devopsdb:
    image: raja8788/dbapp1
    ports:
      - "3306:3306"
    deploy:
      replicas: 2
    networks:
      - mynetwork
    volumes:
      - raja:/opt/rajareddy

  application:
    image: raja8788/webapp1
    ports:
      - "1111:8080"
    deploy:
      replicas: 2
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
volumes:
  raja:
